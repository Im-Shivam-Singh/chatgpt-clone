name: Backend CI/CD

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "gateway/**"
      - "chat-service/**"
      - "ai-service/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - chat-service
          - ai-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Identity
        run: |
          echo "========== Azure Account =========="
          az account show

          echo
          echo "========== Signed In User =========="
          az account show --query user

          echo
          echo "========== Registry =========="
          az acr show \
            --name ${{ secrets.ACR_NAME }} \
            --query "{name:name,loginServer:loginServer,id:id}" \
            -o json

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Verify Docker Login
        run: |
          echo "========== Docker Config =========="
          cat ~/.docker/config.json

          echo
          echo "========== Docker Info =========="
          docker info

      - name: Build Docker Image
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
        run: |
          echo "Building:"
          echo "$IMAGE"
          echo "$IMAGE_LATEST"

          docker build \
            -t "$IMAGE" \
            -t "$IMAGE_LATEST" \
            .

      - name: Show Docker Images
        run: docker images

      - name: Verify Image Exists
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
        run: |
          docker image inspect "$IMAGE"

      - name: Push Docker Images
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
        run: |
          echo "Pushing:"
          echo "$IMAGE"
          echo "$IMAGE_LATEST"

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"