name: Backend CI/CD

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "gateway/**"
      - "chat-service/**"
      - "ai-service/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - chat-service
          - ai-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}" | grep -q "^${{ matrix.service }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        if: steps.changes.outputs.changed == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Login
        if: steps.changes.outputs.changed == 'true'
        run: |
          az account show
          az acr show \
            --name ${{ secrets.ACR_NAME }} \
            --query "{name:name,loginServer:loginServer,id:id}"

      - name: Login to Azure Container Registry
        if: steps.changes.outputs.changed == 'true'
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Verify Docker Login
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Docker config:"
          cat ~/.docker/config.json

          echo
          echo "Images:"
          docker images

      - name: Push Images
        if: steps.changes.outputs.changed == 'true'
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
        run: |
          echo "Pushing:"
          echo "$IMAGE"
          echo "$IMAGE_LATEST"

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"